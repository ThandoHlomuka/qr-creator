<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Creator – Generate custom QR codes with logo</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📱</text></svg>" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <h1 class="logo">QR Creator</h1>
      <p class="tagline">Generate custom QR codes with your brand</p>

      <form id="qr-form" class="form">
        <div class="field">
          <label for="content">Content <span class="req">*</span></label>
          <input type="text" id="content" placeholder="https://example.com" value="https://github.com" required />
        </div>

        <div class="field">
          <label for="size">QR Code Size</label>
          <select id="size">
            <option value="200">200 × 200</option>
            <option value="300" selected>300 × 300</option>
            <option value="400">400 × 400</option>
            <option value="500">500 × 500</option>
            <option value="600">600 × 600</option>
          </select>
        </div>

        <div class="field">
          <label for="error-level">Error Correction</label>
          <select id="error-level">
            <option value="L">Low (L – 7%)</option>
            <option value="M" selected>Medium (M – 15%)</option>
            <option value="Q">Quartile (Q – 25%)</option>
            <option value="H">High (H – 30%)</option>
          </select>
        </div>

        <fieldset class="color-fields">
          <legend>Colors</legend>
          <div class="field row">
            <div>
              <label for="fg-color">Foreground</label>
              <input type="color" id="fg-color" value="#000000" />
            </div>
            <div>
              <label for="bg-color">Background</label>
              <input type="color" id="bg-color" value="#ffffff" />
            </div>
          </div>
        </fieldset>

        <div class="field">
          <label for="logo-upload">Logo (optional)</label>
          <input type="file" id="logo-upload" accept="image/png,image/jpeg,image/webp,image/svg+xml" />
          <div id="logo-preview" class="logo-preview hidden">
            <img id="logo-img" alt="logo preview" />
            <button type="button" id="remove-logo" class="btn-icon" title="Remove logo">&times;</button>
          </div>
        </div>

        <div class="field" id="logo-size-field" style="display:none">
          <label for="logo-size">Logo size <span id="logo-size-val">25</span>%</label>
          <input type="range" id="logo-size" min="10" max="40" value="25" />
        </div>

        <div class="field">
          <label for="margin">Margin</label>
          <select id="margin">
            <option value="0">None</option>
            <option value="1">1 module</option>
            <option value="2" selected>2 modules</option>
            <option value="3">3 modules</option>
            <option value="4">4 modules</option>
          </select>
        </div>

        <div class="field">
          <label for="qr-type">QR Code Type</label>
          <select id="qr-type">
            <option value="static">Static QR Code</option>
            <option value="dynamic">Dynamic QR Code</option>
          </select>
        </div>

        <div id="dynamic-fields" class="dynamic-fields" style="display:none">
          <div class="field">
            <label for="qr-slug">Custom slug (optional)</label>
            <input type="text" id="qr-slug" placeholder="auto-generated if empty" />
          </div>
          <div class="field">
            <label for="manage-key">Management key <span class="req">*</span></label>
            <input type="password" id="manage-key" placeholder="password to manage this QR" required />
          </div>
          <p class="hint">Your QR code will point to a URL you can update anytime without reprinting.</p>
        </div>

        <div class="field checkbox">
          <label>
            <input type="checkbox" id="auto-download" checked />
            Download after generation
          </label>
        </div>

        <button type="submit" class="btn btn-primary" id="generate-btn">Generate QR Code</button>
      </form>
    </aside>

    <main class="main">
      <div class="result">
        <div class="canvas-wrapper" id="canvas-wrapper">
          <canvas id="qr-canvas"></canvas>
          <div class="placeholder" id="placeholder">
            <span class="placeholder-icon">📱</span>
            <p>Enter content and generate your QR code</p>
          </div>
        </div>

        <div class="actions" id="actions" style="display:none">
          <button class="btn btn-primary" id="download-png">Download PNG</button>
          <button class="btn btn-outline" id="download-jpeg">Download JPEG</button>
          <button class="btn btn-outline" id="download-svg">Download SVG</button>
        </div>

        <div id="dynamic-manage" class="dynamic-manage" style="display:none">
          <h2>Your Dynamic QR Codes</h2>
          <div id="qr-list" class="qr-list"></div>
          <div id="edit-panel" class="edit-panel" style="display:none">
            <h3 id="edit-title">Edit QR Code</h3>
            <div class="field">
              <label for="edit-destination">New destination URL</label>
              <input type="url" id="edit-destination" placeholder="https://" />
            </div>
            <div class="field">
              <label for="edit-key-confirm">Enter management key to confirm</label>
              <input type="password" id="edit-key-confirm" placeholder="management key" />
            </div>
            <div class="edit-actions">
              <button class="btn btn-primary" id="save-edit">Save</button>
              <button class="btn btn-outline" id="cancel-edit">Cancel</button>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.4/build/qrcode.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
